<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Personal Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 780px;
      height: 92vh;
      display: flex;
      flex-direction: column;
      background: #1e293b;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }

    .header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .header-text h1 { font-size: 18px; font-weight: 600; color: #fff; }
    .header-text p  { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 2px; }

    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-left: auto;
      box-shadow: 0 0 6px #4ade80;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user      { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message.user .avatar      { background: #6366f1; }
    .message.assistant .avatar { background: #0f766e; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.user .bubble {
      background: #6366f1;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #334155;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    .typing .bubble {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 18px;
    }

    .dot {
      width: 7px; height: 7px;
      background: #94a3b8;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    .input-area {
      padding: 16px 20px;
      background: #0f172a;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 120px;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #6366f1; }
    textarea::placeholder { color: #64748b; }

    button {
      width: 48px; height: 48px;
      background: #6366f1;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    button:hover   { background: #4f46e5; }
    button:active  { transform: scale(0.95); }
    button:disabled { background: #334155; cursor: not-allowed; }

    button svg { width: 20px; height: 20px; fill: #fff; }

    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: #64748b;
    }
    .welcome h2 { font-size: 22px; color: #94a3b8; margin-bottom: 8px; }
    .welcome p  { font-size: 14px; }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-icon">🤖</div>
    <div class="header-text">
      <h1>AI Personal Assistant</h1>
      <p>Powered by Amazon Bedrock + Claude</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="welcome">
      <h2>👋 Hello!</h2>
      <p>Ask me anything. I remember our conversation!</p>
    </div>
  </div>

  <div class="input-area">
    <textarea
      id="userInput"
      placeholder="Type your message..."
      rows="1"
      onkeydown="handleKey(event)"
    ></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>

</div>

<script>
  // ✅ Replace with your API Gateway URL
  const API_URL = 'YOUR_API_GATEWAY_URL/chat';

  const SESSION_ID = 'session-' + Math.random().toString(36).substr(2, 9);
  const chatArea   = document.getElementById('chatArea');
  const userInput  = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function addMessage(role, text) {
    const welcome = chatArea.querySelector('.welcome');
    if (welcome) welcome.remove();

    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    const avatar = role === 'user' ? '👤' : '🤖';
    msg.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
    `;
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showTyping() {
    const msg = document.createElement('div');
    msg.className = 'message assistant typing';
    msg.id = 'typingIndicator';
    msg.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    `;
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    addMessage('user', text);
    userInput.value = '';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: SESSION_ID })
      });

      const data = await res.json();
      const body = typeof data.body === 'string' ? JSON.parse(data.body) : data;
      removeTyping();
      addMessage('assistant', body.message);

    } catch (err) {
      removeTyping();
      addMessage('assistant', '❌ Error: Could not connect to API. Please try again.');
    }

    sendBtn.disabled = false;
    userInput.focus();
  }
</script>

</body>
</html>
